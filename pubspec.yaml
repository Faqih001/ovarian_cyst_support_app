name: ovarian_cyst_support_app
description: "A comprehensive support and management app for ovarian cyst patients."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase Services
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_analytics: ^10.8.5
  firebase_messaging: ^14.7.10

  # Core Dependencies
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  logger: ^2.0.2+1
  timeago: ^3.6.0

  # Security and Storage
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3

  # UI Components and Animation
  smooth_page_indicator: ^1.1.0
  lottie: ^3.1.0
  flutter_svg: ^2.1.0
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_markdown: ^0.7.0
  flutter_screenutil: ^5.8.4
  timeline_tile: ^2.0.0
  animated_text_kit: ^4.2.2
  webview_flutter: ^4.5.0

  # State Management
  flutter_riverpod: ^2.4.10

  # Data Persistence and Offline Support
  sqflite: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Networking and API
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Location and Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3

  # AI and ML
  tflite_flutter: ^0.10.4
  flutter_local_notifications: ^19.2.1

  # Chart and Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41

  # Utilities
  intl: ^0.19.0  # Updated to be compatible with flutter_styled_toast
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  timezone: ^0.10.1
  path: ^1.8.3
  table_calendar: ^3.0.9
  csv: ^6.0.0
  firebase_storage: ^11.6.5
  # fluttertoast: ^8.0.9  # Commenting out problematic package
  flutter_styled_toast: ^2.2.1  # Using alternative toast package that's more compatible

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.24.9
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/education/
    - assets/animations/
    - assets/healthcare_facilities.csv
