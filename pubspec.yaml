name: ovarian_cyst_support_app
description: "A comprehensive support and management app for ovarian cyst patients."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase Services
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_analytics: ^10.8.5
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.5
  firebase_app_check: ^0.2.1+13

  # Machine Learning and Image Processing
  tflite_flutter: ^0.10.4
  image: ^4.1.7
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  ml_algo: ^16.17.8
  ml_dataframe: ^1.6.0
  ml_preprocessing: ^7.0.2
  google_generative_ai: ^0.4.7
  google_ml_kit: ^0.16.3
  image_cropper: ^9.1.0
  image_cropper_platform_interface: ^7.1.0
  image_cropper_for_web: ^6.1.0

  # Core Dependencies
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  logger: ^2.0.2+1
  timeago: ^3.6.0
  collection: ^1.17.0

  # Security and Storage
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3

  # Audio and Voice
  record: ^6.0.0
  record_android: ^1.3.3
  record_web: ^1.1.6
  just_audio: ^0.9.36
  just_audio_web: ^0.4.9
  permission_handler: ^11.0.1

  # Animation
  animated_text_kit: ^4.2.3
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # UI Components
  flutter_svg: ^2.1.0
  flutter_markdown: ^0.7.0
  flutter_screenutil: ^5.8.4
  timeline_tile: ^2.0.0

  # WebView and Platform Integration
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.1
  webview_flutter_wkwebview: ^3.9.4

  # State Management
  flutter_riverpod: ^2.4.10

  # Database and Storage
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking and Connectivity
  http: ^1.1.0
  dio: ^5.4.0
  connectivity_plus: ^6.1.4

  # Location Services
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Data Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41

  # Utilities and Tools
  intl: ^0.19.0
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  timezone: ^0.10.1
  path: ^1.8.3
  table_calendar: ^3.0.9
  csv: ^5.1.1
  flutter_styled_toast: ^2.2.1
  logging: ^1.3.0
  flutter_local_notifications: ^19.2.1
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.24.9
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/education/
    - assets/animations/
    - assets/healthcare_facilities.csv
